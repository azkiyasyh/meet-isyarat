<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahabat Isyarat - WebRTC Room</title>
    <style>
        /* ========================================== */
        /* UI UTAMA (HIJRAH KE DARK MODE)             */
        /* ========================================== */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #202124;
            color: #e8eaed;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #fbcc05; margin-bottom: 10px; }

        .setup-box {
            background: #2f3134;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid #3c4043;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #5f6368;
            background: #202124;
            color: white;
            outline: none;
        }
        input:focus { border-color: #fbcc05; }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            background-color: #fbcc05;
            color: #202124;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover { background-color: #fdd633; transform: translateY(-1px); }
        
        .video-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1100px;
        }
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            width: 46%;
            min-width: 320px;
            border: 2px solid #3c4043;
        }
        video {
            width: 100%;
            display: block;
            background: #000;
        }
        #localWebcam { transform: scaleX(-1); } 
        
        .video-label {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(32, 33, 36, 0.8);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: #fbcc05;
            border: 1px solid rgba(251, 204, 5, 0.3);
        }
        
        #subtitle-area {
            margin-top: 30px;
            width: 90%;
            max-width: 900px;
            background: #2f3134;
            border-bottom: 4px solid #fbcc05;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .sub-title { font-size: 13px; color: #9aa0a6; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .sub-text { font-size: 32px; color: #fbcc05; font-weight: 800; margin: 10px 0; }

        /* ========================================== */
        /* WELCOME SCREEN (HITAM-ABU-KUNING)          */
        /* ========================================== */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #202124;
            background-image: radial-gradient(circle at center, #3c4043 0%, #121212 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            padding: 20px;
            box-sizing: border-box;
        }
        .welcome-card {
            background: #2f3134;
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid #444;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 480px;
            width: 100%;
            animation: fadeInScale 0.7s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .welcome-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(251, 204, 5, 0.3));
        }
        .welcome-card h1 {
            color: #fbcc05;
            font-size: 32px;
            margin: 0 0 15px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .welcome-card p {
            color: #bdc1c6;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 35px 0;
        }
        #start-btn-big {
            background: #fbcc05;
            color: #202124;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(251, 204, 5, 0.2);
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
        }
        #start-btn-big:hover {
            background: #fdd633;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(251, 204, 5, 0.4);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-card">
            <div class="welcome-icon">🤟</div>
            <h1>Sahabat Isyarat</h1>
            <p>Jembatan Komunikasi Video Real-Time dengan Deteksi AI Bahasa Isyarat SIBI.</p>
            <button id="start-btn-big">Masuk ke Ruang Temu ✨</button>
        </div>
    </div>

    <h1>Sahabat Isyarat</h1>
    <p style="color: #9aa0a6;">Status AI: <span id="status" style="color: #fbcc05;">Inisialisasi...</span></p>

    <div class="setup-box">
        <div style="font-size: 14px;">ID Personal: <strong id="my-id" style="color: #fbcc05; font-size: 16px;">Memuat...</strong></div>
        <input type="text" id="peer-id-input" placeholder="ID Partner Demo">
        <button id="connect-btn">HUBUNGKAN SEKARANG</button>
    </div>

    <div class="video-grid">
        <div class="video-wrapper">
            <video id="localWebcam" autoplay playsinline muted></video>
            <div class="video-label">KAMU (Lokal)</div>
        </div>
        <div class="video-wrapper">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="video-label">PARTNER (Remote)</div>
        </div>
    </div>

    <div id="subtitle-area">
        <div class="sub-title">Terjemahan Isyarat Kamu:</div>
        <div id="local-sub" style="color: #fff; font-size: 18px; margin-bottom: 15px;">-</div>
        
        <div style="height: 1px; background: #3c4043; width: 60%; margin: 0 auto 15px;"></div>
        
        <div class="sub-title">Subtitle Dari Partner:</div>
        <div id="remote-sub" class="sub-text">Menunggu isyarat...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

    <script type="module">
        const { FilesetResolver, HandLandmarker } = window;
        const Peer = window.Peer;

        const DOM = {
            localVideo: document.getElementById("localWebcam"),
            remoteVideo: document.getElementById("remoteVideo"),
            statusTxt: document.getElementById("status"),
            myIdDisplay: document.getElementById("my-id"),
            peerIdInput: document.getElementById("peer-id-input"),
            connectBtn: document.getElementById("connect-btn"),
            localSubTxt: document.getElementById("local-sub"),
            remoteSubTxt: document.getElementById("remote-sub"),
            welcomeScreen: document.getElementById("welcome-screen"),
            startBtn: document.getElementById("start-btn-big")
        };

        let handLandmarker = undefined;
        let lastVideoTime = -1;
        let localStream = null;
        let currentText = "";
        let dataConnection = null;
        let peer = null;

        // Click Start
        if (DOM.startBtn) {
            DOM.startBtn.addEventListener('click', () => {
                DOM.welcomeScreen.style.transition = "all 0.5s ease";
                DOM.welcomeScreen.style.opacity = "0";
                DOM.welcomeScreen.style.transform = "scale(1.1)";
                setTimeout(() => {
                    DOM.welcomeScreen.style.display = "none";
                }, 500);

                initMediaPipe();
            });
        }

        async function initMediaPipe() {
            DOM.statusTxt.innerText = "Memuat AI Engine...";
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
                );
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1
                });
                DOM.statusTxt.innerText = "AI Siap! Mengakses Kamera...";
                startCameraAndNetwork();
            } catch (err) {
                DOM.statusTxt.innerText = "Error AI Engine.";
            }
        }

        function startCameraAndNetwork() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: true })
                .then((stream) => {
                    localStream = stream;
                    DOM.localVideo.srcObject = stream;
                    DOM.localVideo.addEventListener("loadeddata", predictWebcam);
                    initWebRTC();
                })
                .catch((err) => {
                    DOM.statusTxt.innerText = "Akses Kamera Gagal.";
                });
        }

        function initWebRTC() {
            peer = new Peer(undefined, {
                host: '0.peerjs.com',
                port: 443,
                secure: true,
                path: '/'
            });

            peer.on('open', (id) => {
                DOM.myIdDisplay.innerText = id;
                DOM.statusTxt.innerText = "Online & Siap.";
            });

            peer.on('call', (call) => {
                call.answer(localStream);
                call.on('stream', (remoteStream) => {
                    DOM.remoteVideo.srcObject = remoteStream;
                    DOM.statusTxt.innerText = "Panggilan Terhubung.";
                });
            });

            peer.on('connection', (conn) => {
                dataConnection = conn;
                setupDataChannelEvents();
            });
        }

        if (DOM.connectBtn) {
            DOM.connectBtn.addEventListener('click', () => {
                const remotePeerId = DOM.peerIdInput.value.trim();
                if (!remotePeerId) return alert("Isi ID Partner!");

                const call = peer.call(remotePeerId, localStream);
                call.on('stream', (remoteStream) => {
                    DOM.remoteVideo.srcObject = remoteStream;
                });

                dataConnection = peer.connect(remotePeerId);
                setupDataChannelEvents();
            });
        }

        function setupDataChannelEvents() {
            dataConnection.on('data', (data) => {
                if (DOM.remoteSubTxt) DOM.remoteSubTxt.innerText = data;
            });
        }

        async function predictWebcam() {
            let startTimeMs = performance.now();
            if (lastVideoTime !== DOM.localVideo.currentTime) {
                lastVideoTime = DOM.localVideo.currentTime;
                const results = handLandmarker.detectForVideo(DOM.localVideo, startTimeMs);
                let detectedSign = "-";

                if (results.landmarks && results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0];
                    
                    const isThumbUp   = landmarks[4].y < landmarks[3].y;
                    const isIndexUp   = landmarks[8].y < landmarks[6].y;
                    const isMiddleUp  = landmarks[12].y < landmarks[10].y;
                    const isRingUp    = landmarks[16].y < landmarks[14].y;
                    const isPinkyUp   = landmarks[20].y < landmarks[18].y;
                    const isIndexDown  = landmarks[8].y > landmarks[5].y;
                    const isMiddleDown = landmarks[12].y > landmarks[9].y;
                    const isRingDown   = landmarks[16].y > landmarks[13].y;
                    const isPinkyDown  = landmarks[20].y > landmarks[17].y;
                    
                    const distThumbToIdx   = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);
                    const distThumbToMid   = Math.hypot(landmarks[4].x - landmarks[12].x, landmarks[4].y - landmarks[12].y);
                    const distIdxToMid     = Math.hypot(landmarks[8].x - landmarks[12].x, landmarks[8].y - landmarks[12].y);
                    const distThumbToPinky = Math.hypot(landmarks[4].x - landmarks[20].x, landmarks[4].y - landmarks[20].y);

                    if (isThumbUp && isIndexUp && isPinkyUp && isMiddleDown && isRingDown && distThumbToIdx > 0.08) {
                        detectedSign = "I LOVE YOU 🤟";
                    } else if (isThumbUp && isIndexUp && isMiddleUp && isRingUp && isPinkyUp && distIdxToMid > 0.05) {
                        detectedSign = "HALO 👋";
                    } else if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp && landmarks[4].y > landmarks[10].y) {
                        detectedSign = "Huruf: B";
                    } else if (isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp && distThumbToMid < 0.05) {
                        detectedSign = "Huruf: D";
                    } else if (distThumbToIdx < 0.04 && isMiddleUp && isRingUp && isPinkyUp && distThumbToMid > 0.05) {
                        detectedSign = "Huruf: F";
                    } else if (!isIndexUp && !isMiddleUp && !isRingUp && isPinkyUp && Math.abs(landmarks[20].x - landmarks[17].x) < 0.04) {
                        detectedSign = "Huruf: I";
                    } else if (isThumbUp && isIndexUp && isMiddleDown && isRingDown && isPinkyDown && distThumbToIdx > 0.10) {
                        detectedSign = "Huruf: L";
                    } else if (distThumbToIdx < 0.06 && distThumbToMid < 0.06 && distThumbToPinky < 0.07) {
                        detectedSign = "Huruf: O";
                    } else if (isIndexDown && isMiddleDown && isRingDown && isPinkyDown && landmarks[4].y < landmarks[6].y && landmarks[4].x < landmarks[5].x) {
                        detectedSign = "Huruf: A";
                    } else if (landmarks[8].y > landmarks[7].y && landmarks[8].y < landmarks[5].y &&
                               landmarks[12].y > landmarks[11].y && landmarks[12].y < landmarks[9].y &&
                               landmarks[16].y > landmarks[15].y && landmarks[16].y < landmarks[13].y &&
                               landmarks[20].y > landmarks[19].y && landmarks[20].y < landmarks[17].y &&
                               landmarks[4].x > landmarks[3].x) {
                        detectedSign = "Huruf: E";
                    }
                }

                if (DOM.localSubTxt) DOM.localSubTxt.innerText = detectedSign;

                if (detectedSign !== currentText && detectedSign !== "-") {
                    currentText = detectedSign;
                    if (dataConnection && dataConnection.open) {
                        dataConnection.send(currentText);
                    }
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }
    </script>
</body>
</html>
